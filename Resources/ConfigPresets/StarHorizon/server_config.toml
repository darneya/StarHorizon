################################################################################
##### General ##################################################################

[net]
port = 1212
bindto = "0.0.0.0"
log_late_msg = false

[database]
engine = "postgres"
pg_host = "database"
pg_port = 5432
pg_database = "ss14"
pg_username = "ss14_user"
pg_password = "%pg_password%"

[game]
hostname = "StarHorizon - Горизонт событий [💫] [18+]"
desc = """
Добро пожаловать на наш сервер! Мы предлагаем полную свободу выбора!

У нас вы встретите:
🏢 Отзывчивую и дружелюбную администрацию, креативное комьюнити и массу возможностей для самореализации!
🏯 Возможность создать свой собственный клан, а впоследствии и фракцию или присоединитесь к уже существующим!
🩺 Хирургию! А также кибернетические конечности и органы.
🔬 Ксенобиологию! Вырасти своего ручного ксеноса!
🤖 Робототехнику! Исследуй и строй железных монстров! Покажи Тиранозавру на экспедиции кто тут Босс!
🌱 Продвинутую ботанику с новыми видами растений и цветов, а также ферментацию и генетику! Создай свой одуванчик - убийцу!
👹 А также лучшие Барки! Гав!

Мы рады встрече с тобой, странник!
"""
soft_max_players = 100
lobbyduration = 180
fallbackpreset = "Extended"

[hub]
advertise = false
#tags = "lang:ru,region:eu_e,rp:med"
#server_url = "ss14://ss14.aavikko.ru:1212"
## Wizard's Den hub
#hub_urls = "https://hub.spacestation14.com/"

[server]
rules_file = "DefaultRuleset"
lobby_name = "StarHorizon"

[console]
# Указать CKey игрока, который по-умолчанию и не зависимо ни от чего
# будет иметь НАИВЫСШИЕ права на сервере (HOST)
login_host_user = "EvilBug"

[admin]
see_own_notes = true
note_fresh_days = 0
message_wait_time = 1
new_player_threshold = 180
afk_time = 180.0
admins_count_in_playercount = true # отображает админов в счетчике

[interaction]
rate_limit_announce_admins_delay = -1 # убирает спам о превышении лимитов игроком

[ahelp]
admin_prefix = true # отображает ранг адмема в АХелп
admin_prefix_webhook = true

[infolinks]
discord = "https://discord.starhorizon.ru"
#wiki = "https://wiki.aavikko.ru/"

################################################################################
##### In Game ##################################################################

[atmos]
space_wind = false
monstermos_rip_tiles = false
mmos_spacing_speed = 0.95
mmos_max_wind = 1000.0

[biomass]
easy_mode = false

[vote]
timermap = 30
map_enabled = true
restart_not_allowed_when_admin_online = false

[shuttle]
arrivals_planet = false
arrivals_returns = true
emergency_early_launch_allowed = true
emergency_dock_time = 300.0
emergency_authorize_time = 15.0
recall_turning_point = 0.1
auto_call_time = 300
auto_call_extension_time = 90

[rules]
time = 90.0

[tips]
enabled = false

[ooc]
enable_during_round = false

[looc]
enabled_crit = false

[chat]
max_announcement_length = 2048

[ic]
flavor_text = true

################################################################################
##### Metrics ##################################################################

[metrics]
enabled = true
host = "ss14"
port = 9001
#runtime = false

[loki]
enabled = false
#address = "http://127.0.0.1:3100"
#name = "aavikko_ss14_main"

