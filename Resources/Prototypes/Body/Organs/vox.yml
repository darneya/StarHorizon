- type: entity
  id: OrganVoxLungs
  parent: OrganHumanLungs
  description: "The blue, anaerobic lungs of a vox, they intake nitrogen to breathe. Any form of gaseous oxygen is lethally toxic if breathed in."
  suffix: "vox"
  components:
  - type: WorldItem
    overridePrefix: lungs_world
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
  - type: Metabolizer
    metabolizerTypes: [ Vox ]
  - type: Lung
    alert: LowNitrogen
  - type: Item
    size: Small
    heldPrefix: lungs


- type: entity
  id: OrganVoxBrain
  parent: [BaseAnimalOrgan, BaseOrganBrain]
  name: brain
  description: "The source of incredible, unending intelligence. Honk."
  components:
  - type: WorldItem
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    state: brain
  - type: Organ
  - type: Input
    context: "ghost"
  - type: Brain
  - type: InputMover
  - type: Examiner
  - type: BlockMovement
  - type: BadFood
  - type: Tag
    tags:
      - Meat
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: GreyMatter
          Quantity: 5
  - type: FlavorProfile
    flavors:
      - people
  - type: FoodSequenceElement
    entries:
      Burger: Brain
      Taco: Brain
  - type: Item
    size: Small
    heldPrefix: brain

- type: entity
  id: OrganVoxEyes
  parent: [BaseAnimalOrgan, BaseOrganEyes]
  name: eyes
  description: "I see you!"
  components:
  - type: WorldItem
    overridePrefix: eyeballs_world
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    layers:
      - state: eyeball-l
      - state: eyeball-r
  - type: Item
    size: Small
    heldPrefix: eyeballs

- type: entity
  id: OrganVoxTongue
  parent: [BaseAnimalOrgan, BaseOrganTongue]
  name: tongue
  description: "A fleshy muscle mostly used for lying."
  components:
  - type: WorldItem
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    state: tongue

- type: entity
  id: OrganVoxEars
  parent: [BaseAnimalOrgan, BaseOrganEars]
  name: ears
  description: "There are three parts to the ear. Inner, middle and outer. Only one of these parts should normally be visible."
  components:
  - type: WorldItem
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    state: ears

- type: entity
  id: OrganVoxHeart
  parent: [BaseAnimalOrgan, BaseOrganHeart]
  name: heart
  description: "I feel bad for the heartless bastard who lost this."
  components:
  - type: WorldItem
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    state: heart-on
  # The heart 'metabolizes' medicines and poisons that aren't filtered out by other organs.
  # This is done because these chemicals need to have some effect even if they aren't being filtered out of your body.
  # You're technically 'immune to poison' without a heart, but.. uhh, you'll have bigger problems on your hands.
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [Vox]
    groups:
    - id: Medicine
    - id: Cryogenic # Frontier
    - id: Poison
    - id: Narcotic
  - type: Item
    size: Small
    heldPrefix: heart

- type: entity
  id: OrganVoxStomach
  parent: [BaseAnimalOrgan, BaseOrganStomach]
  name: stomach
  description: "Gross. This is hard to stomach."
  components:
  - type: WorldItem
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    state: stomach
  - type: Item
    size: Small
    heldPrefix: stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
  # The stomach metabolizes stuff like foods and drinks.
  # TODO: Have it work off of the ent's solution container, and move this
  # to intestines instead.
  - type: Metabolizer
    # mm yummy
    maxReagents: 3
    metabolizerTypes: [Vox]
    groups:
    - id: Food
    - id: Drink

- type: entity
  id: OrganVoxLiver
  parent: [BaseAnimalOrgan, BaseOrganLiver]
  name: liver
  description: "Pairing suggestion: chianti and fava beans."
  components:
  - type: WorldItem
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    state: liver
  - type: Item
    size: Small
    heldPrefix: liver
  - type: Metabolizer # The liver metabolizes certain chemicals only, like alcohol.
    maxReagents: 1
    metabolizerTypes: [Vox]
    groups:
    - id: Alcohol
      rateModifier: 0.1 # removes alcohol very slowly along with the stomach removing it as a drink

- type: entity
  id: OrganVoxKidneys
  parent: [BaseAnimalOrgan, BaseOrganKidneys]
  name: kidneys
  description: "Filters toxins from the bloodstream."
  components:
  - type: WorldItem
    overridePrefix: kidney_world
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    layers:
      - state: kidney-l
      - state: kidney-r
  - type: Item
    size: Small
    heldPrefix: kidneys
  # The kidneys just remove anything that doesn't currently have any metabolisms, as a stopgap.
  - type: Metabolizer
    maxReagents: 5
    metabolizerTypes: [Vox]
    removeEmpty: true

- type: entity
  id: OrganVoxMuscle
  parent: [BaseAnimalOrgan]
  name: muscle
  description: "Make you move!"
  components:
  - type: WorldItem
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    state: muscle
  - type: Item
    size: Small
