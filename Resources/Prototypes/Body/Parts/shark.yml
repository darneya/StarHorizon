- type: entity
  id: PartShark
  parent: [BaseItem, BasePart]
  name: "shark body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: TorsoShark
  name: "shark torso"
  parent: [PartShark, BaseTorso]
  components:
  - type: Sprite
    sprite: _StarHorizon\Mobs\Species\Shark\parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

