- type: entity
  id: PartSharkman
  parent: [BaseItem, BasePart]
  name: "sharkman body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: TorsoSharkman
  name: "sharkman torso"
  parent: [PartSharkman, BaseTorso]
  components:
