- type: entity
  save: false
  id: AnCoPlayerSiliconBase
  parent: [MobRobotic, MobDamageable, MobCombat, MobAtmosExposed, MobFlammable]
  abstract: true
  components:
  - type: ContentEye
  - type: CameraRecoil
  - type: Reactive
    groups:
      Flammable: [Touch]
      Extinguish: [Touch]
      Acidic: [Touch]
    reactions:
      - reagents: [Water, SpaceCleaner]
        methods: [Touch]
        effects:
          - !type:WashCreamPieReaction
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 10
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: Damageable
    damageContainer: Silicon
    damageModifierSet: IPC
  - type: InteractionOutline
  - type: MovementSpeedModifier
    baseWalkSpeed: 4
    baseSprintSpeed: 3
  - type: ZombieImmune
  - type: CanEnterCryostorage
  - type: DoAfter
  - type: RotationVisuals
    horizontalRotation: 90
  - type: Examiner
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Silicon
    entityType: enum.SiliconType.Player
    batteryPowered: false
    chargeThresholdMid: 0.60
    chargeThresholdLow: 0.30
    chargeThresholdCritical: 0
    speedModifierThresholds:
      4: 1
      3: 1
      2: 0.80
      1: 0.45
      0: 0.00
  - type: Temperature
    heatDamageThreshold: 1800
    coldDamageThreshold: 260
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold: 0.1
    heatDamage:
      types:
        Heat: 3
    atmosTemperatureTransferEfficiency: 0.05
  - type: KillOnOverheat
  - type: Deathgasp
    prototype: SiliconDeathgasp
    needsCritical: false
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      165: Dead
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:GibBehavior { }
  - type: Flashable
  - type: Flammable
    fireSpread: true
    canResistFire: true
    damage:
      types:
        Heat: 0
  - type: Identity
  - type: RangedDamageSound
    soundGroups:
      Brute:
        collection: MetalBulletImpact
    soundTypes:
      Heat:
        collection: MetalLaserImpact
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
  - type: Hands
  - type: Inventory
    templateId: human
  - type: InventorySlots
  - type: Appearance
  - type: WeldingHealable
  - type: Cuffable
  - type: AnimationPlayer
  - type: Buckle
  - type: CreamPied
  - type: Stripping
  - type: Strippable
  - type: ComplexInteraction
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: Emoting
  - type: Grammar
    attributes:
      proper: true
  - type: Climbing
  - type: StandingState
  - type: MindContainer
    showExamineInfo: true
  - type: SSDIndicator
  - type: CanEscapeInventory
  - type: Ensnareable
    sprite: Objects/Misc/ensnare.rsi
  - type: Speech
    speechSounds: Pai
  - type: TypingIndicator
    proto: robot
  - type: Vocal
    wilhelm: "/Audio/Voice/IPC/wilhelm.ogg"
    sounds:
      Male: MaleIPC
      Female: FemaleIPC
      Unsexed: MaleIPC
  - type: BodyEmotes
    soundsId: IPCBodyEmotes
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcFist
    attackRate: 1
    damage:
      types:
        Blunt: 6
    heavyRateModifier: 1
    heavyDamageBaseModifier: 1
    heavyPartDamageMultiplier: 1
    heavyStaminaCost: 0
    maxTargets: 1
  - type: MobPrice
    price: 1500
    deathPenalty: 0.01
  - type: Pullable
  - type: Puller
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Stutter
    - SeeingRainbows
    - Electrocution
    - SlurredSpeech
    - PressureImmunity
    - Muted
    - TemporaryBlindness
    - Pacified
  - type: Blindable
  - type: FireVisuals
    alternateState: Standing
  - type: LightningTarget
    priority: 1
    lightningExplode: false
  - type: Carriable
  - type: IdExaminable
  - type: HealthExaminable
    examinableTypes:
    - Blunt
    - Slash
    - Piercing
    - Heat
    - Shock
