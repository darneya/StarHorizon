- type: entity
  parent: [ClothingHeadHardsuitBase, BaseUASContraband, BaseToggleClothing]
  id: ClothingHeadHardsuitSpider
  categories: [ HideSpawnMenu ]
  name: шлем офицера Паука UAS
  description: Прочный, похожий на леденец шлем.
  suffix: StarHorizon
  components:
  - type: Sprite
    sprite: _StarHorizon/Clothing/Head/Hardsuits/uasspiderh.rsi
  - type: Clothing
    sprite: _StarHorizon/Clothing/Head/Hardsuits/uasspiderh.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8
  - type: ToggleClothing
    action: UASToggleInvisibilitySpider
  - type: ComponentToggler
    parent: true
    components:
    - type: Stealth
      hadOutline: true
    - type: StealthOnMove
      minVisibility: -1
      passiveVisibilityRate: -0.37
      movementVisibilityRate: 1

