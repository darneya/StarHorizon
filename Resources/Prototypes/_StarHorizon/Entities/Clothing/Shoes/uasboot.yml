- type: entity
  parent: [ClothingShoesMilitaryBase, BaseUASContraband]
  id: UASBoots
  suffix: StarHorizon, UAS
  name: боевые ботинки UAS
  description: Ботинки с укреплённой подошвой из EFS кристалла.
  components:
  - type: Sprite
    sprite: _StarHorizon/Clothing/Shoes/Boots/uasboot.rsi
  - type: Clothing
    sprite: _StarHorizon/Clothing/Shoes/Boots/uasboot.rsi
  - type: ClothingSlowOnDamageModifier
    modifier: 0.5
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepBoots

- type: entity
  parent: [ClothingShoesBase, BaseToggleClothing, BaseUASContraband]
  id: UASClothingShoesBootsMag
  name: магнитные ботинки UAS
  suffix: StarHorizon, UAS
  description: Ботинки облегчённой конструкции. Обладают продвинутой системой магнитов.
  components:
  - type: Sprite
    sprite: _StarHorizon/Clothing/Shoes/Boots/uasmagboots.rsi
    layers:
    - state: icon
      map: [ "enum.ToggleVisuals.Layer" ]
  - type: Clothing
    sprite: _StarHorizon/Clothing/Shoes/Boots/uasmagboots.rsi
  - type: Magboots
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleVisuals.Toggled:
        enum.ToggleVisuals.Layer:
          True: {state: icon-on}
          False: {state: icon}
  - type: StaticPrice
    price: 200
  - type: ToggleClothing
    action: ActionToggleMagboots
  - type: ComponentToggler
    components:
      - type: NoSlip
