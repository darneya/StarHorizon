- type: entity
  parent: [ClothingOuterHardsuitBase, BaseCentcommContraband]
  id: ClothingOuterHardsuitCenctom
  name: бронированный скафандр Центком
  description: Специализированный укреплённый скафандр для выходящих в поле членов Центрального Командования.
  suffix: StarHorizon
  components:
  - type: Sprite
    sprite: _StarHorizon/Clothing/OuterClothing/Hardsuits/centspace.rsi
  - type: Clothing
    sprite: _StarHorizon/Clothing/OuterClothing/Hardsuits/centspace.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.2
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.75
        Heat: 0.20
        Radiation: 0.25
        Caustic: 0.20
  - type: ClothingSpeedModifier
    walkModifier: 1.0
    sprintModifier: 1.0
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitCentcom

