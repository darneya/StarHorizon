  suffix: StarHorizon
  components:
  - type: Sprite
    sprite: _StarHorizon/Clothing/OuterClothing/Hardsuits/shadowdark.rsi
  - type: Clothing
    sprite: _StarHorizon/Clothing/OuterClothing/Hardsuits/shadowdark.rsi
