- type: species
  id: Shark
  name: species-name-shark
  roundStart: true
  prototype: MobShark
  sprites: MobShark
  defaultSkinTone: "#34a223"
  markingLimits: MobSharkMarkingLimits
  dollPrototype: MobSharkDummy
  skinColoration: Hues
  maleFirstNames: NamesReptilianMale
  femaleFirstNames: NamesReptilianFemale
  naming: FirstDashFirst

- type: speciesBaseSprites
  id: MobSharkSprites
  sprites:
    Head: MobSharkHead
    Snout: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobSharkTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    LArm: MobSharkLArm
    RArm: MobSharkRArm
    LHand: MobSharkLHand
    RHand: MobSharkRHand
    LLeg: MobSharkLLeg
    RLeg: MobSharkRLeg
    LFoot: MobSharkLFoot
    RFoot: MobSharkRFoot

- type: markingPoints
  id: MobSharkMarkingLimits
  points:
    Hair:
      points: 0
      required: false
    FacialHair:
      points: 0
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ Sharkdorsal ]
    Snout:
      points: 1
      required: true
      defaultMarkings: [ LizardSnoutRound ]
    HeadTop:
      points: 2
      required: true
    HeadSide:
      points: 1
      required: false
      defaultMarkings: [ SharkEarsDefault ]
    # Frontier: apparently these don't exist on Delta
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 1
      required: false
    # End Frontier
    Chest:
      points: 4
      required: true
      defaultMarkings: [ SharkChestDefault ]
    Legs:
      points: 8
      required: false
    Arms:
      points: 8
      required: false
      defaultMarkings: [ SharkDefaultHuescale ]

