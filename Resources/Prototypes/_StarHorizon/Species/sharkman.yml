- type: species
  id: Sharkmanman
  name: species-name-Sharkman
  roundStart: true
  prototype: MobSharkman
  sprites: MobSharkman
  defaultSkinTone: "#34a223"
  markingLimits: MobSharkmanMarkingLimits
  dollPrototype: MobSharkmanDummy
  skinColoration: Hues
  maleFirstNames: NamesReptilianMale
  femaleFirstNames: NamesReptilianFemale
  naming: FirstDashFirst

- type: speciesBaseSprites
  id: MobSharkmanSprites
  sprites:
    Head: MobSharkmanHead
    Snout: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobSharkmanTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    LArm: MobSharkmanLArm
    RArm: MobSharkmanRArm
    LHand: MobSharkmanLHand
    RHand: MobSharkmanRHand
    LLeg: MobSharkmanLLeg
    RLeg: MobSharkmanRLeg
    LFoot: MobSharkmanLFoot
    RFoot: MobSharkmanRFoot

- type: markingPoints
  id: MobSharkmanMarkingLimits
  points:
    Hair:
      points: 0
      required: false
    FacialHair:
      points: 0
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ Sharkmandorsal ]
    Snout:
      points: 1
      required: true
      defaultMarkings: [ LizardSnoutRound ]
    HeadTop:
      points: 2
      required: true
    HeadSide:
      points: 1
      required: false
      defaultMarkings: [ SharkmanEarsDefault ]
    # Frontier: apparently these don't exist on Delta
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 1
      required: false
    # End Frontier
    Chest:
      points: 4
      required: true
      defaultMarkings: [ SharkmanChestDefault ]
    Legs:
      points: 8
      required: false
    Arms:
      points: 8
      required: false
      defaultMarkings: [ SharkmanDefaultHuescale ]

