- type: job
  id: TraumaParamedicJob
  name: парамедик Траумы
  description: job-description-traumaparamedic
  playTimeTracker: TraumaParamedicJob
  whitelisted: true
  startingGear: TraumaParamedicGear
  alwaysUseSpawner: true
  icon: "JobIconDoc"
  requireAdminNotify: true
  supervisors: job-supervisors-centcom
  weight: 170
  displayWeight: 55 # Second from the top
  canBeAntag: false
  accessGroups:
  - AllAccess
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant, TrackingImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      - type: MedicalBountyBankPayment # any medical bounties sold go directly into the bank
        account: Medical
  - !type:GiveItemOnHolidaySpecial
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

- type: startingGear
  id: TraumaParamedicGear
  equipment:
    id: TraumaParamedicIDCard
    pocket1: EncryptionKeyTrauma
    pocket2: PinpointerUniversal
    jumpsuit: ClothingUniformJumpsuitMilitaryColorGrey
    shoes: ClothingShoesSwat

