- type: entity
  save: false
  name: Urist McKatunian
  parent: BaseMobSpeciesOrganic
  id: BaseMobKatunian
  abstract: true
  components:
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
      enum.SurgeryUIKey.Key:
        type: SurgeryBui
  - type: HumanoidAppearance
    species: Katunian
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: _Void/Mobs/Species/Katunian/parts.rsi
    state: full
  - type: Body
    prototype: Katunian
    requiredLegs: 2
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Katunian # Horizon
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Piercing: 5
  - type: MobThresholds
    thresholds:
      0: Alive
      110: Critical
      220: Dead
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: TallWhitelist
    scale: 1.1
  - type: ShortWhitelist
    scale: 0.9
    density: 140
    pseudoItem: true
    cosmeticOnly: false
  - type: Temperature
    heatDamageThreshold: 320 # 5 lower than base # Frontier: 315<320
    coldDamageThreshold: 220 # 40 lower than base,
  - type: Carriable # Carrying system from nyanotrasen.
  #- type: Inventory # Allows vulps to wear properly shaped helmets
  #  speciesId: vulpkanin
  - type: Speech
    allowedEmotes: ['KHiss', 'KFurr', 'KPurr', 'KGrowl']
  - type: Vocal
    sounds:
      Male: MaleKatunian
      Female: FemaleKatunian
      Unsexed: MaleKatunian

- type: entity
  parent: BaseSpeciesDummy
  id: MobKatunianDummy
  categories: [ HideSpawnMenu ]
  name: Urist McKatunian
  description: A dummy katuniann meant to be used in character setup.
  components:
  - type: HumanoidAppearance
    species: Katunian
