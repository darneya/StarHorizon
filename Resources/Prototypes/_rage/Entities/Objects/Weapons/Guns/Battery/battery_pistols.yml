- type: entity
  categories: [ DoNotMap ]
  id: NFWeaponEnergyPistolLaserX01MultiphaseSheriff
  parent: [ BaseC2ContrabandUnredeemable, NFWeaponEnergyPistolLaserAntique ]
  name: X-01 multiphase energy gun
  description: |-
    This is an expensive, modern recreation of an antique laser gun. This gun has several unique firemodes. On the handle is a label that says 'for authorized use only.' Unlike regular versions, it has a unique firing mode.
  components:
  - type: Sprite
    sprite: _DV/Objects/Weapons/Guns/Battery/multiphase_energygun.rsi
  - type: Clothing
    sprite: _DV/Objects/Weapons/Guns/Battery/multiphase_energygun.rsi
  - type: Item
    heldPrefix: lethal
    inhandVisuals: {} # FIXME: overwriting antique laser
  - type: ProjectileBatteryAmmoProvider
    proto: NFBulletLaserLow
    fireCost: 60
  - type: EnergyGun
    fireModes:
    - proto: NFBulletDisabler
      fireCost: 60
      name: disable
      state: disabler
    - proto: NFBulletLaserLow
      fireCost: 60
      name: kill
      state: lethal
    - proto: ProjectileEmp
      fireCost: 300
      name: Ion
      state: special
  - type: GenericVisualizer
    visuals:
      enum.EnergyGunFireModeVisuals.State:
        Firemode:
          Disabler: { state: mode-disabler }
          Lethal: { state: mode-lethal }
          Special: { state: mode-ion }
