- type: entity
  parent: [ClothingOuterHardsuitBase, BaseC2ContrabandUnredeemable] # Frontier: BaseSyndicateContraband<BaseC3SyndicateContraband, added ContrabandClothing as parent
  id: ClothingOuterHardsuitNfsdElite
  name: elite NFSD hardsuit
  description: A spacesuit that combines combat protection with hazardous environment protection.
  components:
  - type: Sprite
    sprite: _rage/Clothing/OuterClothing/Hardsuits/elitenfgear.rsi
  - type: Clothing
    sprite: _rage/Clothing/OuterClothing/Hardsuits/elitenfgear.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.001
  - type: ExplosionResistance
    damageCoefficient: 0.4
  - type: FireProtection
    reduction: 0.8
  - type: StaminaResistance # do not add these to other equipment or mobs, we don't want to microbalance these everywhere
    damageCoefficient: 0.6
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.55
        Slash: 0.55
        Piercing: 0.5
        Heat: 0.4
        Radiation: 0.1
        Caustic: 0.5
  - type: Item
    size: Huge
  - type: ClothingSpeedModifier
    walkModifier: 1.0
    sprintModifier: 1.0
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitNfsdElite
  - type: Tag
    tags:
    - Hardsuit