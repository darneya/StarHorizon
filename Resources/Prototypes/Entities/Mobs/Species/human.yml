# Anything human specific (e.g. UI, input) goes under MobHuman
- type: entity
  parent: BaseMobSpeciesOrganic
  id: BaseMobHuman
  name: Urist McHands
  abstract: true
  components:
  - type: Hunger
  - type: Icon # It will not have an icon in the adminspawn menu without this. Body parts seem fine for whatever reason.
    sprite: Mobs/Species/Human/parts.rsi
    state: full
  - type: Thirst
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: HumanoidAppearance
    species: Human
    hideLayersOnEquip:
    - Hair
    - Snout
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: Carriable # Frontier: Carrying system from nyanotrasen.
  - type: Speech # Frontier
    allowedEmotes: ['Belch'] # Frontier
  - type: Pain
    painThresholds:
      Nothing: 0
      MildPain: 50
      AveragePain: 100
      SeverePain: 150
      UnbeatablePain: 250
      DeadPain: 500
    screamPrototype: screamHuman
    converterPrototype: human

- type: painConverter
  id: human
  convert:
    Slash: 1
    Blunt: 1
    Heat: 5
    Piercing: 1

- type: screamOfPain
  id: screamHuman
  screamList:
    20:
      - "Ургх!"
      - "ЧЁРТ!"
      - "БЛЯДЬ!"
      - "Мгхххх..."
    40:
      - "CУКАААА!!!"
      - "ТВОЮ МАТЬ!!!"
      - "БЛЯЯЯЯЯ!"
      - "АРГХХХХ!!!"

- type: entity
  parent: BaseSpeciesDummy
  id: MobHumanDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
