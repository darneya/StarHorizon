- type: entity
  save: false
  name: Urisst' Mzhand
  parent: BaseMobSpeciesOrganic
  id: BaseMobShark
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Shark
    hideLayersOnEquip:
    - Snout
    - HeadTop
    - HeadSide
    undergarmentBottom: UndergarmentBottomBoxersShark
  - type: Hunger
  - type: Puller
    needsHands: false
  - type: Thirst
  - type: Icon
    sprite: _StarHorizon\Mobs\Species\Shark\parts.rsi
    state: full
  - type: Body
    prototype: Shark
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatLizard
      amount: 5
  - type: LizardAccent
  - type: Speech
    speechSounds: Lizard
    speechVerb: Reptilian
    allowedEmotes: ['Thump', 'ReptilianHiss'] # Imp: add ReptilianHiss
  - type: TypingIndicator
    proto: lizard
  - type: Vocal
    sounds:
      Male: MaleReptilian
      Female: FemaleReptilian
      Unsexed: MaleReptilian
  - type: BodyEmotes
    soundsId: ReptilianBodyEmotes
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Scale
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 10
  - type: Temperature
    heatDamageThreshold: 315
    coldDamageThreshold: 185
    currentTemperature: 300
    specificHeat: 42
    coldDamage:
      types:
        Cold : 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      270: 0.8
      265: 0.6
      235: 0.4
  - type: Wagging
  - type: Inventory
    speciesId: shark
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: Carriable # Frontier: Carrying system from nyanotrasen.
  - type: ShortWhitelist # Frontier
    scale: 0.8 # Frontier
    density: 140 # Frontier
    pseudoItem: true # Frontier
    cosmeticOnly: false # Frontier
  - type: TallWhitelist # Frontier
    scale: 1.2 # Frontier

- type: entity
  parent: BaseSpeciesDummy
  id: MobSharkDummy
  categories: [ HideSpawnMenu ]
  description: A dummy shark meant to be used in character setup.
  components:
  - type: HumanoidAppearance
    species: Shark
    hideLayersOnEquip:
    - Snout
    - HeadTop
    - HeadSide
    undergarmentBottom: UndergarmentBottomBoxersShark
  - type: Inventory
    speciesId: shark
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

