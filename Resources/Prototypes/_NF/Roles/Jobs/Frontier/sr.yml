- type: job
  id: StationRepresentative
  name: job-name-sr
  description: job-description-sr
  playTimeTracker: JobHeadOfPersonnel
  salary: 80000 # Horizon
  forceFaction: FactionFrontier # Horizon
  requirements:
    - !type:OverallPlaytimeRequirement
      time: 144000 # 20 hrs
    - !type:RoleTimeRequirement
      role: JobSecurityGuard
      time: 21600 # 6 hours as security guard
  whitelisted: false
  startingGear: SrGear
  alwaysUseSpawner: true
  icon: "JobIconHeadOfPersonnel"
  requireAdminNotify: true
  supervisors: job-supervisors-centcom
  weight: 170
  displayWeight: 60 # Top
  canBeAntag: false
  accessGroups:
  - AllAccess
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant, TrackingImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      - type: PreventShipyardTitleOverwrite
  - !type:GiveItemOnHolidaySpecial
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

- type: startingGear
  id: SrGear
  equipment:
    pocket1: NFWeaponEnergyPistolDisabler
  storage:
    back:
    - Flash
    - RubberStampSr
    - DoorRemoteCommand
  encryptionKeys:
  - EncryptionKeyStationMaster

- type: chameleonOutfit
  id: StationRepresentativeChameleonOutfit
  job: StationRepresentative
  hasMindShield: true
  equipment:
    head: ClothingHeadHatSrBeret
    mask: ClothingMaskBreath
    neck: ClothingNeckMantleSr
    outerClothing: ClothingOuterJacketSr
    gloves: ClothingHandsGlovesHop
