#region WizDen
- type: entity # TODO: switch to .25 rifle (caseless)
  id: NFWeaponRifleAssaultSm
  parent: [ NFBaseWeaponRifleAssaultChamber30, BaseAttachableHolder, NFBaseWeaponFrameRifleAssaultCybersun ]
  name: Soland-Moss # Renamed: real brand name
  description: |-
    An iconic weapon of war. An illegal firearm often used by Syndicate agents.
  components:
  - type: Clothing
    sprite: _NF/Objects/Weapons/Guns/Rifles/solandmoss.rsi
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Rifles/solandmoss.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  # Horizon Attachments start
  - type: AttachableHolder
    slots:
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - AttachmentM90GrenadeLauncher
          - AttachmentM90UnderbarrelShotgun
          - AttachmentVerticalGrip
          - AttachmentLaserSight
      rmc-aslot-rail:
        whitelist:
          tags:
          - AttachmentMagneticHarness
          - AttachmentReflexSight
          - AttachmentT2Miniscope
      rmc-aslot-barrel:
        whitelist:
          tags:
          - AttachmentSuppressor
          - AttachmentAntiLyingWarrior
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-underbarrel: 0.3125, -0.0625
      rmc-aslot-rail: 0, 0
      rmc-aslot-barrel: 0.96875, 0
  # Horizon Attachments end

