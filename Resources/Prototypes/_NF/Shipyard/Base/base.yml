# Separating this for ease of visualization
- type: vessel
  id: BaseVessel
  abstract: true
  name: AAA Bikeshed
  description: Questionably spaceworthy.
  price: 50000
  category: Medium
  group: Shipyard
  addComponents:
  - type: IFF
    color: '#FFFFFFFF'
    flags: [IsPlayerShuttle]
  costModifiers:
    - !type:RoleModifier
      role: "Pilot"
      costMultiplier: 0.8
    - !type:RoleModifier
      role: "Mercenary"
      costMultiplier: 1.2
    - !type:RoleModifier
      role: "PlantTechnician"
      costMultiplier: 0.9
    - !type:RoleModifier
      role: "PlantManager"
      costMultiplier: 0.9

- type: vessel
  id: BaseVesselSecurity
  abstract: true
  parent: BaseVessel
  group: Security
  addComponents:
  - type: IFF
    color: '#32CD32'
    flags: [IsPlayerShuttle]

- type: vessel
  id: BaseVesselAntag
  abstract: true
  parent: BaseVessel
  group: BlackMarket
  addComponents:
  - type: IFF
    color: '#DC143C'
    flags: [IsPlayerShuttle, HideLabel]

- type: entity
  id: StandardFrontierAntagVesselExpedition
  parent:
  - StandardFrontierVessel
  - BaseStationExpeditions
  categories: [ HideSpawnMenu ]
  components:
  - type: ExtraShuttleInformation
    hiddenWithoutOpenJobs: true
  - type: NoMailStation # Horizon: Disable mail for players on antagonist vessels

- type: vessel
  id: BaseVesselPirate
  abstract: true
  parent: BaseVessel
  group: BlackMarket
  addComponents:
  - type: IFF
    color: '#CD853F'
    flags: [IsPlayerShuttle, HideLabel]

# Note: we keep the IsPlayerShuttle flag to hide consistently with other shuttles.
- type: vessel
  id: BaseVesselNonPlayer
  abstract: true
  parent: BaseVessel
  group: Custom # Should not be available in any shipyard

- type: vessel
  id: BaseVesselBus
  abstract: true
  parent: BaseVesselNonPlayer
  addComponents:
  - type: PreventPilot
  - type: ProtectedGrid
    preventArtifactTriggers: true
    preventEmpEvents: true
    preventExplosions: true
    preventFloorPlacement: true
    preventFloorRemoval: true
    preventRCDUse: true
    killHostileMobs: true
  - type: LinkedLifecycleGridParent
