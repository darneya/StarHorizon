# Shuttle Notes:
#
- type: vessel
  id: Retort
  parent: BaseVessel
  name: FSC Retort
  description: A robust gas mining and engineering vessel designed and deployed by the Far Star Corporation to provide infrastructure support for deep space operations.
  price: 70000 # T3 engie/salvage
  category: Medium
  group: Shipyard
  shuttlePath: /Maps/_NF/Shuttles/retort.yml
  guidebookPage: ShipyardRetort
  class:
  - Atmospherics
  engine:
  - Bananium
  # Horizon start
  costModifiers:
    - !type:RoleModifier
      role: "Pilot"
      costMultiplier: 0.8
    - !type:RoleModifier
      role: "Mercenary"
      costMultiplier: 1.2
    - !type:RoleModifier
      role: "PlantTechnician"
      costMultiplier: 0.9
    - !type:RoleModifier
      role: "PlantManager"
      costMultiplier: 0.9
    - !type:FactionCostModifier
      faction: "FactionEdison"
      costMultiplier: 0.9
    - !type:FactionCostModifier
      faction: "FactionLVHI"
      costMultiplier: 0.9
    - !type:FactionCostModifier
      faction: "FactionUAC"
      costMultiplier: 0.9
    - !type:FactionCostModifier
      faction: "FactionNakamura"
      costMultiplier: 0.9
  # Horizon end

- type: gameMap
  id: Retort
  mapName: 'FSC Retort'
  mapPath: /Maps/_NF/Shuttles/retort.yml
  minPlayers: 0
  stations:
    Retort:
      stationProto: StandardFrontierVessel
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Retort {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationJobs
          availableJobs:
            ContractorInterview: [ 0, 0 ]
            PilotInterview: [ 0, 0 ]
            MercenaryInterview: [ 0, 0 ]
