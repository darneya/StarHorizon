# ОРУЖЕЙНЫЕ СТОЙКИ
- type: construction
  name: стойка для ружей
  id: GunRackConstruction
  graph: WeaponRackConstructionGraph
  startNode: start
  targetNode: GunRackNode
  category: construction-category-furniture
  description: Стойка для хранения средств ускоренного умиротворения.
  icon:
    sprite: _NF/Structures/Furniture/Armory/weapon_rack.rsi
    state: base-gun
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
    - !type:TileNotBlocked

