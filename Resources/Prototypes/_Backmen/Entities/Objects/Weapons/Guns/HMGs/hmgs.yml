- type: entity
  name: MG-42
  parent: NFBaseWeaponFrameLightMachineGun
  id: WeaponLightMachineGunMG42
  suffix: Пулемёт
  description: Пулемёт ОПЗ периода Второй мировой войны. Разработан фирмой Metall-und Lackwarenfabrik Johannes Großfuß в 1942 году. После войны поставки данного пулемета возобновили в 2342 году.
  components:
  - type: Sprite
    sprite: Backmen/Objects/Weapons/Gunsx64/LMGs/mg42/big.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: Backmen/Objects/Weapons/Gunsx64/LMGs/mg42/tiny.rsi
  - type: Item
    sprite: Backmen/Objects/Weapons/Gunsx64/LMGs/mg42/tiny.rsi
  - type: GunWieldBonus
    minAngle: -30
    maxAngle: -38
  - type: Gun
    minAngle: 34
    maxAngle: 55
    fireRate: 12
    soundGunshot:
      path: /Audio/Weapons/Guns64/LMGs/t27.ogg
      params:
        volume: -3
  - type: ChamberMagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineHeavyMachineGunDrum
        insertSound: /Audio/Weapons/Guns64/LMGs/t42_reload.ogg
        ejectSound: /Audio/Weapons/Guns64/LMGs/t42_unload.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineHeavyMachineGunDrum
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: true
  - type: Appearance
  - type: Wieldable
  - type: UseDelay
    delay: 1.9
  - type: GunRequiresWield
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 0.5
  - type: HeldSpeedModifier
  - type: AnCoGunOverheat
    heatPerShot: 0.02
    cooldownRate: 0.1
    visualOverheat: false
    unlockThreshold: 0
    overheatThreshold: 1
    touchDamage:
      types:
        Heat: 10
  - type: NFWeaponDetails
    class: weapon-details-class-heavy-machine-gun
