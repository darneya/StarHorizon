- type: entity
  name: ACP-14
  parent: NFBaseWeaponFramePistol
  id: WeaponPistolACP14
  suffix: Backman, Пистолет
  description: The ACP-14, produced by Earth Armories. A reliable sidearm that loads 9x19mm.
  components:
  - type: Sprite
    sprite: Backmen/Objects/Weapons/Gunsx64/Pistols/acp14/big.rsi
  - type: Item
    sprite: Backmen/Objects/Weapons/Gunsx64/Pistols/acp14/tiny.rsi
  - type: Gun
    angleIncrease: 8
    angleDecay: 10
    cameraRecoilScalar: 1
    maxAngle: 15
    minAngle: 1
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns64/Pistols/acp14_shot.ogg
  - type: ChamberMagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistol45ACP
        insertSound: /Audio/Weapons/Guns64/Pistols/acp14_reload.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistol45ACP
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistolACP
        priority: 1
        whitelist:
          tags:
            - CartridgePistol45ACP
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: NFWeaponDetails
    manufacturer: weapon-details-manufacturer-nanotrasen-munitions

