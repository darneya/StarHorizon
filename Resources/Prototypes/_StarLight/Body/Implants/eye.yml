- type: entity
  id: EyeImplantMedical
  name: медицинский имплант
  description: Позволяет вам видеть информацию о состоянии окружающих.
  parent: BaseEntityEyeImplant
  components:
  - type: Sprite
    state: eye_implant_medical
  - type: OrganImplant
    compsToAdd:
    - type: ShowHealthBars
    - type: ShowHealthIcons

- type: entity
  id: EyeImplantSecurity
  name: имплант службы безопасности.
  description: Позволяет вам видеть информацию о должностях окружающих.
  parent: BaseEntityEyeImplant
  components:
  - type: Sprite
    state: eye_implant_security
  - type: OrganImplant
    compsToAdd:
    - type: ShowJobIcons
    - type: ShowMindShieldIcons
    - type: ShowCriminalRecordIcons

- type: entity
  id: EyeImplantSyndie
  name: имплант синдиката
  description: Позволяет вам видеть информацию о должностях и состоянии окружающих.
  parent: BaseEntityEyeImplant
  components:
  - type: Sprite
    state: eye_implant_syndicate
  - type: OrganImplant
    compsToAdd:
    - type: ShowHealthBars
    - type: ShowHealthIcons
    - type: ShowJobIcons
    - type: ShowMindShieldIcons
    - type: ShowCriminalRecordIcons
    - type: ShowSyndicateIcons
