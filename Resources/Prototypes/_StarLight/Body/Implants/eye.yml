- type: entity
  id: BaseEntityEyeImplant
  abstract: true
  parent: [ BaseItem, BaseImplant ]
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/implants.rsi
  - type: Organ
  - type: Gibbable
  - type: FlavorProfile
    flavors:
      - people

- type: entity
  id: EyeImplantWelding
  name: сварочный имплант
  description: Защищает глаза от вспышек при сварке.
  parent: BaseEntityEyeImplant
  components:
  - type: Sprite
    state: eye_implant_welding
  - type: OrganImplant
    compsToAdd:
    - type: EyeProtection

