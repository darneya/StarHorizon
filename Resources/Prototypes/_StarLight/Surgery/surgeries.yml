    - SurgeryStepRetractScalp
    - SurgeryStepDrillBurrHoles
    - SurgeryStepCutSkull
    - SurgeryStepRemoveBoneFlap
    - SurgeryStepClampDuraMater
    - SurgeryStepInciseDuraMater
    - SurgeryStepRetractDuraMater
    - SurgeryStepSeverCranialNerves
