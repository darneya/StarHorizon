- type: entity
  id: SurgeryStepBase
  categories:
  - HideSpawnMenu
  components:
  - type: SurgeryStep

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepOpenIncisionScalpel
  name: сделайте надрез
  components:
  - type: SurgeryStep
    tools:
    - type: Scalpel
    add:
    - type: IncisionOpen
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: SurgeryStepBleedEffect
    damage:
      types:
        Slash: 10
  - type: SurgeryStepEmoteEffect

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepClampBleeders
  name: зажмите кровоточащие каналы
  components:
  - type: SurgeryStep
    tools:
    - type: Hemostat
    add:
    - type: BleedersClamped
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: hemostat
  - type: SurgeryClampBleedEffect

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRetractSkin
  name: оттяните кожу
  components:
  - type: SurgeryStep
    tools:
    - type: Retractor
    add:
    - type: SkinRetracted
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: retractor

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepSawBones
  name: прорежьте кости
  components:
  - type: SurgeryStep
    duration: 5
    tools:
    - type: BoneSaw
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/saw.rsi
    state: saw
  - type: SurgeryStepEmoteEffect

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepPriseOpenBones
  name: раскройте кости
  components:
  - type: SurgeryStep
    tools:
    - type: BoneSetter
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: setter

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepCloseBones
  name: вправьте кости
  components:
  - type: SurgeryStep
    tools:
    - type: BoneSetter
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: setter

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepMendRibcage
  name: почините кости
  components:
  - type: SurgeryStep
    tools:
    - type: BoneGel
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/bone_gel.rsi
    state: bone-gel

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepCloseIncision
  name: закройте разрез
  components:
  - type: SurgeryStep
    tools:
    - type: Cautery
    remove:
    - type: SkinRetracted
    - type: BleedersClamped
    - type: IncisionOpen
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/cautery.rsi
    state: cautery
  - type: SurgeryStepEmoteEffect
  - type: SurgeryClearProgress

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepCutAbdominalMuscles
  name: разрежьте мышцы живота
  components:
  - type: SurgeryStep
    tools:
    - type: Scalpel
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: SurgeryStepEmoteEffect

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRetractAbdominalWalls
  name: оттяните брюшные стенки
  components:
  - type: SurgeryStep
    tools:
    - type: Retractor
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: retractor

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepSutureMuscles
  name: наложите швы
  components:
  - type: SurgeryStep
    duration: 4
    tools:
    - type: Cautery
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/cautery.rsi
    state: cautery

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRestoreAbdominalWalls
  name: восстановите брюшные стенки
  components:
  - type: SurgeryStep
    duration: 3
    tools:
    - type: Retractor
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: retractor
  - type: SurgeryStepEmoteEffect
