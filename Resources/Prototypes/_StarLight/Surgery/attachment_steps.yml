- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepExposeNerves
  name: обнаружьте нервы
  components:
  - type: SurgeryStep
    duration: 4
    tools:
    - type: Scalpel
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: SurgeryStepEmoteEffect

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepExposeBloodVessels
  name: обнаружьте кровеносные сосуды
  components:
  - type: SurgeryStep
    duration: 4
    tools:
    - type: Scalpel
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: SurgeryStepEmoteEffect

- type: entity
  parent: SurgeryStepBase
  id: SurgeryLimbAttachmentStep
  name: присоедините конечность
  components:
  - type: SurgeryStep
    duration: 4
    tools:
    - type: MetaData
  - type: Sprite
    sprite: Objects/Consumable/Food/Baked/pizza.rsi
    state: meat-slice
  - type: SurgeryStepAttachLimbEffect

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRejoinNerves
  name: соедините нервы
  components:
  - type: SurgeryStep
    duration: 5
    tools:
    - type: Hemostat
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: hemostat
  - type: SurgeryStepEmoteEffect

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRejoinBloodVessels
  name: соедините кровеносные сосуды
  components:
  - type: SurgeryStep
    duration: 5
    tools:
    - type: Hemostat
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: hemostat

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRestoreCartilage
  name: восстановите хрящевую ткань
  components:
  - type: SurgeryStep
    duration: 4
    tools:
    - type: BoneGel
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/bone_gel.rsi
    state: bone-gel
