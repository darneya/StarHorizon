#liver
- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepLocateLiver
  name: обнаружьте печень
  components:
  - type: SurgeryStep
    duration: 3
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
    state: liver

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepClampLiverVessels
  name: зажмите печёночные сосуды
  components:
  - type: SurgeryStep
    duration: 4
    tools:
    - type: Hemostat
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: hemostat

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRemoveLiver
  name: удалите печень
  components:
  - type: SurgeryStep
    duration: 4
    tools:
    - type: Scalpel
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: SurgeryStepEmoteEffect
  - type: SurgeryStepOrganExtract
    organ:
    - type: OrganLiver

