  name: отключенный защитный бот АнКо
  suffix: StarHorizon, AnCo, Mob
  parent: BaseItem
  components:
  - type: DeleteOnTrigger
  - type: OnUseTimerTrigger
    delay: 3.5
  - type: SpawnOnTrigger
    proto: AnCoDrone
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Mobs/bot.rsi
    state: crab-off
