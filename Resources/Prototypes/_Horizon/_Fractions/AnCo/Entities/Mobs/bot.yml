- type: entity
  id: BaseAnCoCrab
  suffix: StarHorizon, AnCo,
  name: защитный бот АнКо
  description: Бот необходимый для защиты важного оборудования АнКо
  parent: [ BaseMob, MobCombat]
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Mobs/bot.rsi
    state: crab-bot
    drawdepth: Mobs
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: NpcFactionMember
    factions:
      - AnCoSecurBot
  - type: MovementSpeedModifier
    baseWalkSpeed : 2
    baseSprintSpeed : 4
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          KazmieSheet1:
            min: 1
            max: 1
          ArdonSheet1:
            min: 0
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  # - type: NpcFactionMember
  #   factions:
  #     - AnCoMaster
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobState
    allowedStates:
      - Alive
      - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      20: Dead

- type: entity
  id: AnCoCrab
  suffix: StarHorizon, AnCo, Mob, Anomaly
  name: защитный бот АнКо
  description: Бот необходимый для защиты важного оборудования АнКо
  parent: [ BaseAnCoCrab]
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Mobs/bot.rsi
    state: crab-bot
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: NpcFactionMember
    factions:
      - AnCoSecurBot
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/sparks4.ogg
    damage:
      types:
        Blunt: 2
        Heat: 3
  - type: StaminaDamageOnHit
    damage: 25


# дрон
- type: entity
  id: AnCoDrone
  parent: AnCoCrab
  suffix: StarHorizon, AnCo, Mob
  components:
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/sparks4.ogg
    damage:
      types:
        Blunt: 5
        Heat: 5
  - type: StaminaDamageOnHit
    damage: 40
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          KazmieSheet1:
            min: 1
            max: 1
          ArdonSheet1:
            min: 0
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SpawnItemsOnUse
    items:
      - id: AnCoDroneOff
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/Machines/button.ogg
  - type: MobThresholds
    thresholds:
      0: Alive
      60: Dead


- type: entity
  id: AnCoDroneOff
  name: отключенный защитный бот АнКо
  suffix: StarHorizon, AnCo, Mob
  parent: BaseItem
  components:
  - type: DeleteOnTrigger
  - type: OnUseTimerTrigger
    delay: 3.5
  - type: SpawnOnTrigger
    proto: AnCoDrone
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Mobs/bot.rsi
    state: crab-off
  - type: Item
    sprite: _Horizon/_Fractions/AnCo/Mobs/bot.rsi
    state: crab-off
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/Machines/button.ogg

