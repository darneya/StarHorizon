- type: entity
  id: AnCoFlyDroneHugeDungeon
  parent: BaseAnCoFlyDrone
  suffix: StarHorizon, AnCo, Dungeon
  name: боевой дрон АнКо
  description: Зачем давать дрону зубы если можно дать пушки?
  components:
  - type: Sprite
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Mobs/flybot.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: flyhuge
  - type: Item
    sprite: _Horizon/_Fractions/AnCo/Mobs/flybot.rsi
    state: flyhuge
  - type: Gun
    fireRate: 1.5
    selectedMode: FullAuto
    availableModes:
    - FullAuto
  - type: BallisticAmmoProvider
    proto: StandartBallisticAnCoPistol
    capacity: 100
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: HTN
    rootTask:
      task: SimpleRangedHostileCompound
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          KazmieSheet1:
            min: 1
            max: 3
          ArdonSheet1:
            min: 0
            max: 5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: MobState
    allowedStates:
      - Alive
      - Critical
      - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      50: Critical
      100: Dead
  - type: DamageStateVisuals
    states:
      Alive:
        Base: flyhuge
      Critical:
        Base: flyhuge-death
      Dead:
        Base: flyhuge-death
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
