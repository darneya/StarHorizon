# начало Base
- type: entity
  id: BaseAnCoCrab
  suffix: StarHorizon, AnCo,
  parent: [BaseMob, MobCombat]
  categories: [ HideSpawnMenu ]
  components:
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          KazmieSheet1:
            min: 0
            max: 1
          ArdonSheet1:
            min: 0
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: NpcFactionMember
    factions:
      - HostileUniversally

- type: entity
  id: BaseAnCoFlyDrone
  parent: [BaseMob, MobCombat]
  suffix: StarHorizon, AnCo, Mob
  categories: [ HideSpawnMenu ]
  components:
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          KazmieSheet1:
            min: 1
            max: 1
          ArdonSheet1:
            min: 0
            max: 1
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
  - type: NpcFactionMember
    factions:
      - HostileUniversally

- type: entity
  id: BaseAnCoMech
  suffix: StarHorizon, AnCo,
  name: боевой мех АнКо
  description: боевой тип тяжелого АВС АМЕ
  parent: [BaseMob, MobCombat]
  categories: [ HideSpawnMenu ]
  components:
