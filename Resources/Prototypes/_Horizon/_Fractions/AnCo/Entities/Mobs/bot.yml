- type: entity
  id: AnCoFlyDroneSmallDungeon
  parent: BaseAnCoFlyDrone
  suffix: StarHorizon, AnCo, Dungeon
  name: дрон компаньен АнКо
  description: Теперь у вас есть друг по лучше этих наземных жуков. Бе!
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Mobs/flybot.rsi
    state: flysmall
  - type: Item
    sprite: _Horizon/_Fractions/AnCo/Mobs/flybot.rsi
    state: flymedium
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/sparks4.ogg
    damage:
      types:
        Blunt: 5
        Heat: 10
  - type: StaminaDamageOnHit
    damage: 20
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          KazmieSheet1:
            min: 1
            max: 1
          ArdonSheet1:
            min: 0
            max: 1
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

