# начало включенные версии
- type: entity
  id: AnCoCrab
  suffix: StarHorizon, AnCo, Mob, Anomaly
  name: защитный бот АнКо
  description: Бот необходимый для защиты важного оборудования АнКо
  parent: [ BaseAnCoCrab]
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Mobs/bot.rsi
    state: crab-bot
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/sparks4.ogg
    damage:
      types:
        Blunt: 2
        Heat: 3
  - type: StaminaDamageOnHit
    damage: 25
  - type: MovementSpeedModifier
    baseWalkSpeed : 2
    baseSprintSpeed : 4
  - type: HTN
    rootTask:
      task: SimpleHostileCompound

