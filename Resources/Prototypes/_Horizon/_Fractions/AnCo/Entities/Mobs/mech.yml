- type: entity
  id: AnCoMechCyclopDungeon
  suffix: StarHorizon, AnCo, Dungeon
  name: АМЕ Циклоп
  description: боевой тип тяжелого АВС АМЕ Циклоп. Момент когда прогресс победил.
  parent: [BaseAnCoMob, MobHumanoidHostileAISimpleRanged]
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Mobs/bot.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: cyclop-bot
  - type: Gun
    fireRate: 0.5
    selectedMode: FullAuto
    availableModes:
    - FullAuto
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: BallisticAmmoProvider
    proto: StandartExplodesAnCo
    capacity: 100
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          KazmieSheet1:
            min: 0
            max: 10
          ArdonSheet1:
            min: 0
            max: 10
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: MobState
    allowedStates:
      - Alive
      - Critical
      - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      890: Critical
      900: Dead
  - type: DamageStateVisuals
    states:
      Alive:
        Base: cyclop-bot
      Critical:
        Base: cyclop-death
      Dead:
        Base: cyclop-death

