- type: entity
  parent: [BaseItem]
  id: BaseAnCoFlatpack
  name: базовый плоскоблок АнКо
  description: Вершина инженерной мысли, само-конструкционный блок, совместим с системами активации НТ.
  categories:
  - HideSpawnMenu
  components:
  - type: Item
    size: Large
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Objects/Misc/flatpack.rsi
    layers:
    - state: flatpack
  - type: Appearance
  - type: StaticPrice
    price: 500
  - type: Rotatable # Frontier
  - type: BindToStation # Horizon
    enabled: false # Horizon - should be draggable between stations

- type: entity
  parent: BaseAnCoFlatpack
  id: AnCoThrusterFlatpack
  suffix: StarHorizon, Anco
  name: плоскоблок двигателя
