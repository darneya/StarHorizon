- type: entity
  id: AnCoArdonShield
  parent: [ BaseAnCoContraband, RiotBulletShield ]
  name: ардониевый щит
  description: обыкновенные плотные листы ардония, можно удобно держать.
  suffix: StarHorizon, AnCo, Weapon
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Objects/Weapons/Melee/shields.rsi
    state: ardon-icon
  - type: Item
    sprite: _Horizon/_Fractions/AnCo/Objects/Weapons/Melee/shields.rsi
    heldPrefix: ardon
  - type: Reflect
    reflectProb: 0.6
    reflects:
      - Energy
  - type: Blocking
    passiveBlockFraction: 0.5
    passiveBlockModifier:
      coefficients:
        Blunt: 1
        Slash: 1
        Piercing: 0.8
        Heat: 0.5
    activeBlockModifier:
      coefficients:
        Blunt: 1
        Slash: 1
        Piercing: 0.8
        Heat: 0.3
      flatReductions:
        Heat: 10
  - type: Destructible
    thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 200
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 100 #This is probably enough damage before it breaks
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
            - !type:SpawnEntitiesBehavior
              spawn:
                ArdonSheet1:
                  min: 2
                  max: 2

