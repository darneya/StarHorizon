- type: entity
  id: AnCoAnomalyCircuitboard
  parent: [BaseItem, BaseAnCoContraband]
  name: микросхема АнКо
  suffix: StarHorizon, AnCo
  description: Красная прозрачная микросхема. Вы ощущаете исходящее от неё тепло.
  components:
    - type: Sprite
      sprite: _Horizon/_Fractions/AnCo/Objects/Misc/ciruitboard.rsi
      state: boardproto
    - type: Item
      storedRotation: -90
    - type: StaticPrice
      price: 100
    - type: MachineBoard
      prototype: AnCoFabricator
      stackRequirements:
        ArdonSheetStack: 5
        KazmieSheetStack: 20
      requirements:
        MatterBin: 3
        Manipulator: 3

