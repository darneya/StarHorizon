- type: entity
  name: оружейный кейс АнКо
  parent: [WeaponCaseLong, BaseAnCoContraband]
  id: AnCoWeaponCaseLong
  description: Прочный ящик для безопасности вашего оружия, а не вас.
  suffix: StarHorizon, AnCo, Long
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Objects/Storage/Cases/guncaselong.rsi
  - type: Item
    sprite: _Horizon/_Fractions/AnCo/Objects/Storage/Cases/guncaselong.rsi
  - type: AnCoWeaponCaseHack
    explosionIntensity: 16
    explosionSlope: 2
    explosionMaxTileIntensity: 2
    explosionPrototype: AnCoExplodes
  - type: Lock
    locked: true
  - type: AccessReader
    access: [[ "AccessAnCoOfficer" ]]
  - type: WiresPanel
  - type: Wires
    boardName: wires-board-name-weapon-case
    layoutId: AnCoWeaponCaseHack
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface

