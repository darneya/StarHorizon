
- type: entity
  name: оружейный кейс АнКо
  parent: BaseStorageItem
  id: AnCoWeaponCaseBase
  categories: [ HideSpawnMenu ]
  description: Прочный ящик для безопасности вашего оружия, а не вас.
  suffix: StarHorizon, AnCo
  components:
  - type: Item
    size: Large # Frontier: Ginormous<Large
    shape: # Frontier
    - 0,0,6,3 # Frontier
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,6,3
    storageOpenSound: /Audio/Items/toolbox_open.ogg
    storageCloseSound: /Audio/Items/toolbox_close.ogg
    storageInsertSound: /Audio/Items/toolbox_insert.ogg
    storageRemoveSound: /Audio/Items/toolbox_remove.ogg
  - type: Appearance
  - type: Sprite
    layers:
    - map: [ base ]
      state: icon
    - state: unshaded
      shader: unshaded
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: icon-open }
          False: { state: icon }
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/toolbox_drop.ogg


- type: entity
  name: оружейный кейс АнКо
  parent: [AnCoWeaponCaseBase, BaseAnCoContraband]
  id: AnCoWeaponCaseLong
  description: Прочный ящик для безопасности вашего оружия, а не вас.
  suffix: StarHorizon, AnCo, Long
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Objects/Storage/Cases/guncaselong.rsi
  - type: Item
    sprite: _Horizon/_Fractions/AnCo/Objects/Storage/Cases/guncaselong.rsi
  - type: AnCoWeaponCaseHack
    explosionIntensity: 16
    explosionSlope: 2
    explosionMaxTileIntensity: 2
    explosionPrototype: AnCoExplodes
  - type: Lock
    locked: true
  - type: AccessReader
    access: [[ "AccessAnCoOfficer" ]]
  - type: WiresPanel
  - type: Wires
    boardName: wires-board-name-weapon-case
    layoutId: AnCoWeaponCaseHack
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface

