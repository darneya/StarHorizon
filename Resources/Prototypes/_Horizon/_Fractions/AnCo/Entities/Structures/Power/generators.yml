- type: entity
  parent: BaseGenerator
  id: ArdonGenerator
  name: Ардониевый генератор
  description: генератор на основе распада ардония, долговечный и надежный.
  suffix: StarHorizon, AnCo, Structure
  components:
  - type: PowerSupplier
    supplyRate: 10000
  - type: Explosive
    explosionType: AnCoExplodes
    # Same as AME, but numbers still picked from a hat.
    maxIntensity: 100
    intensitySlope: 2
    totalIntensity: 200
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Structures/Machines/generator.rsi
    layers:
    - state: icon
    - state: generator-unshaded
      shader: unshaded
