- type: entity
  id: AnCoAirlockGlass
  parent: AirlockGlass
  name: стеклянный шлюз АнКо
  suffix: StarHorizon, AnCo, Structure
  description: зачем им окна?
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Structures/Airlocks/airlockglass.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
        - !type:SpawnEntitiesBehavior
          spawn:
            KazmieSheet1:
              min: 1
              max: 5
            ArdonSheet1:
              min: 3
              max: 5

