- type: entity
  parent: ComputerIFFAnCo
  id: ComputerIFFFullAnCo
  name: консоль маскировки АнКо
  suffix: StarHorizon, AnCo, Structure
  description: Терминал для маскировки шаттлов.
  components:
  - type: IFFConsole
    allowedFlags:
      - Hide
      - HideLabel
  - type: ActivatableUI
    key: enum.IFFConsoleUiKey.Key
  - type: UserInterface
    interfaces:
        enum.IFFConsoleUiKey.Key:
          type: IFFConsoleBoundUserInterface
        enum.WiresUiKey.Key:
          type: WiresBoundUserInterface

