- type: entity
  id: MobCatUmaAnCo
  parent: [NFMobPet, MobCatGhost, ShowSecurityIcons]
  name: Юми
  suffix: StarHorizon, AnCo, Cat
  description: Корпоративная кошка АнКо.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Horizon/_Fractions/AnCo/Mobs/Cat/uma.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: uma
  - type: DamageStateVisuals
    states:
      Alive:
        Base: uma
      Critical:
        Base: uma-death
      Dead:
        Base: uma-death
  - type: RandomMetadata
    nameSegments: null
  - type: AutoImplant
    implants:
    - LightImplant
  - type: FlashImmunity
  - type: IntrinsicRadioTransmitter
    channels:
    - AnCoRadio
  - type: ActiveRadio
    channels:
    - AnCoRadio
  - type: MeleeWeapon
    damage:
      types:
        Piercing: 10 # Declawed cat
  - type: StaminaDamageOnHit
    damage: 18
  - type: NpcFactionMember
    factions:
    - Cat
    - AnCoSecurBot
  - type: CharacterFactionMember
    faction: FactionAnCo

