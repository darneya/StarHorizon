# Inferno difficulty versions of Rogue Silicon mobs
# - All units can see through walls
# - Melee units don't retreat after attack
# - All units can pry doors open
# - All units can smash walls (CombatMode required)

# ============ MELEE UNITS - NO RETREAT ============

- type: entity
  parent: MobRogueSiliconScrap
  id: MobRogueSiliconScrapInferno
  categories: [ HideSpawnMenu ]
  components:
  - type: HTN
    rootTask:
       task: InfernoSimpleMeleeHostileCompound
    blackboard:
      NavClimb: !type:Bool
        false
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: CombatMode
  - type: MeleeWeapon
    attackRate: 1.0
    altDisarm: false
    angle: 0
    animation: WeaponArcPunch
    damage:
      types:
        Heat: 4
        Blunt: 6
        Structural: 40
    soundHit:
      collection: MetalThud
  - type: Tool
    speedModifier: 2.0
    qualities:
      - Prying
    hideQualities: true
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 2.0

