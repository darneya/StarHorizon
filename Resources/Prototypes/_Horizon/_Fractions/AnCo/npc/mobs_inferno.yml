- type: entity
  parent: BaseAnCoCrab
  id: AnCoCrabInferno
  name: защитный бот АнКо
  suffix: Inferno
  categories: [ HideSpawnMenu ]
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Tag
    tags:
      - DoorBumpOpener
  - type: NpcFactionMember
    factions:
      - SimpleHostile
  - type: HTN
    rootTask:
       task: InfernoSimpleMeleeHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      VisionRadius: !type:Single
        30
      AggroVisionRadius: !type:Single
        30
  - type: CombatMode
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/sparks4.ogg
    damage:
      types:
        Blunt: 5
        Heat: 8
  - type: Tool
    speedModifier: 5.0
    qualities:
      - Prying
    hideQualities: true
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 5.0

