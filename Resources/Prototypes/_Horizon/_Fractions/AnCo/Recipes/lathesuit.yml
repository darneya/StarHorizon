
- type: entity
  id: AnCoSuitFabricator
  parent: [BaseLatheLube, BaseAnCoContraband]
  name: фабрикатор обмундирования АнКо
  description: Как вы его собрали?
  suffix: StarHorizon, AnCo, Structure
  components:
  - type: OreSiloClient
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Structures/Machines/fabricatorsuit.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
  - type: Machine
    board: AnCoSuitCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
        - AnCoMaterial
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    staticPacks:
    - AnCoSuitCraft

- type: latheRecipePack
  id: AnCoSuitCraft
  recipes:
