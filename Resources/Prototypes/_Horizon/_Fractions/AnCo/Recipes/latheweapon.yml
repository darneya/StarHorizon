
- type: entity
  id: AnCoWeaponFabricator
  parent: [BaseLatheLube, BaseAnCoContraband]
  name: фабрикатор вооружения АнКо
  description: Как вы его собрали?
  suffix: StarHorizon, AnCo, Structure
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Structures/Machines/fabricatorweapon.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
  - type: Machine
    board: AnCoWeaponCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
        - AnCoMaterial
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    staticPacks:
    - AnCoWeaponCraft

- type: latheRecipePack
  id: AnCoWeaponCraft
  recipes:
  - WeaponRiflesAnCo
  - WeaponAutoPistolAnCo
  - WeaponPistolAnCo
  - PMLaserAnCoGun
  - AnCoWeaponHeater
  - AnCoSplah
  - AnCoSabre
  - AnCoLine
  - AnCoHammer
  - AnCoShovel
  - AnCoSpearPlasma
  - AnCoAxe
  - AnCoKnife

