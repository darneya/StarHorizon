
- type: entity
  id: AnCoOtherFabricator
  parent: [BaseLatheLube, BaseAnCoContraband]
  name: фабрикатор снаряжения АнКо
  description: Как вы его собрали?
  suffix: StarHorizon, AnCo, Structure
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Structures/Machines/fabricatorother.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
  - type: Machine
    board: AnCoOtherCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
        - AnCoMaterial
        - AnCoOre
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    staticPacks:
    - AnCoOtherCraft

- type: latheRecipePack
  id: AnCoOtherCraft
  recipes:
  - ArdonSheet1
  - KazmieSheet1
  - MagazinePistol35
  - MagazineRifle20
  - AnCoEnergyCore
  - PDAAnCo
  - AnCoOmegaTool
  - AnCoHandcuffs
  - AnCoWeaponCircuitboard
  - AnCoSuitCircuitboard
