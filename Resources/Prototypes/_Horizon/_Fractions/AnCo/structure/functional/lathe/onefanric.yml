- type: entity
  id: AnCoWarningFabricator
  parent: [BaseStructure, BaseAnCoContraband]
  name: аварийный фабрикатор
  description: Данный фабрикатор имеет необходимое количество материалов, для записанных чертежей.
  suffix: StarHorizon, AnCo, Structure
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Structures/Machines/uasprotoplat.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
  - type: Machine
    board: AnCoAnomalyCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
        - AnCoMaterial
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    staticPacks:
    - AnCoStandartCraft

- type: anCoDisposableFabricatorSet
  id: ExampleToolsSet
  name: anco-disposable-fabricator-set-tools-name
  description: anco-disposable-fabricator-set-tools-desc
  sprite:
    sprite: Objects/Tools/toolbox_gold.rsi
    state: icon
  content:
  - CrateBaseAnCoSpider
