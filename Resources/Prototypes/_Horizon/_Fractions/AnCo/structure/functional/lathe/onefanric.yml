- type: entity
  id: AnCoEmergencyFabricator
  parent: [BaseStructure, BaseAnCoContraband]
  name: аварийный фабрикатор
  description: Одноразовый фабрикатор для экстренного получения снаряжения. Выберите нужные наборы и подтвердите выбор.
  suffix: StarHorizon, AnCo, Structure
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/AnCo/Structures/Machines/onefabtic.rsi
    layers:
    - state: icon
      map: ["enum.AnCoDisposableFabricatorVisualLayers.IsWorking"]
  - type: AnCoDisposableFabricator
    possibleSets:
    - ExampleToolsSet
    maxSelectedSets: 1
    workDuration: 3.3
    idleState: icon
    workingState: work
  - type: AnCoDisposableFabricatorVisuals
    idleState: icon
    workingState: work
  - type: Appearance
  - type: ActivatableUI
    key: enum.AnCoDisposableFabricatorUIKey.Key
  - type: UserInterface
    interfaces:
      enum.AnCoDisposableFabricatorUIKey.Key:
        type: AnCoDisposableFabricatorBoundUserInterface

- type: anCoDisposableFabricatorSet
  id: ExampleToolsSet
  name: anco-disposable-fabricator-set-tools-name
  description: anco-disposable-fabricator-set-tools-desc
  sprite:
    sprite: Objects/Tools/toolbox_gold.rsi
    state: icon
  content:
  - CrateBaseAnCoSpider
