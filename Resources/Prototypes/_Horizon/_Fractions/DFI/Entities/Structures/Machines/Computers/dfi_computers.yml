- type: entity
  parent: [BaseStructureIndestructible, BaseComputerAiAccess]
  id: ComputerIdDFI
  name: DFI ID card computer
  suffix: DFI
  description: Terminal for programming DFI agent ID cards.
  components:
  - type: IdCardConsole
    accessLevels:
    - DFI
    privilegedIdSlot:
      name: id-card-console-privileged-id
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        components:
        - IdCard
    targetIdSlot:
      name: id-card-console-target-id
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        components:
        - IdCard
  - type: ActivatableUI
    key: enum.IdCardConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.IdCardConsoleUiKey.Key:
        type: IdCardConsoleBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: CrewManifestViewer
    ownerKey: enum.IdCardConsoleUiKey.Key
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: Sprite
    sprite: _Horizon/_Fractions/DFI/dfi_id_computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
      sprite: Structures/Machines/computers.rsi
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
      sprite: Structures/Machines/computers.rsi
    - map: ["computerLayerScreen"]
      state: dfi_id
    - map: ["computerLayerKeys"]
      state: dfi_id_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
      sprite: Structures/Machines/computers.rsi
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#3c5eb5"
  - type: Tag
    tags:
    - AccessBreakerImmune
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      IdCardConsole-privilegedId: !type:ContainerSlot
      IdCardConsole-targetId: !type:ContainerSlot
