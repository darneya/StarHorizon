- type: entity
  parent: [ClothingOuterArmorBasic]
  id: ClothingOuterArmorInteQInfiltrator
  suffix: StarHorizon, Inteq
  name: armored infiltrator cape
  description: High-quality raincoat with an armored plate made of multilayer plasteel. It combines lightness and durability, has a buffer lining and fits perfectly to the body without making unnecessary sounds when worn.
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/Inteq/Armor/inteq_infiltrator.rsi
  - type: Clothing
    sprite: _Horizon/_Fractions/Inteq/Armor/inteq_infiltrator.rsi
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.65
        Piercing: 0.5
        Radiation: 0.9
        Caustic: 0.9
        Heat: 0.8

- type: entity
  parent: [ClothingOuterArmorRaid, ClothingOuterBaseToggleable]
  id: ClothingOuterArmorInteQIronTombstone
  suffix: StarHorizon, Inteq
  name: Iron Tombstone armor suit
  description: Ancient, but no less formidable suit of armor. It provides incredible protection from bullets and shrapnel, but it hinders movement. Or so it was before the technical department attached a passive exoskeleton to the base.
  components:
  - type: Sprite
    sprite: _Horizon/_Fractions/Inteq/Armor/inteq_tombstone.rsi
  - type: Clothing
    sprite: _Horizon/_Fractions/Inteq/Armor/inteq_tombstone.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetInteQIronTombstone
  - type: PointLight
    color: "#FF8C00"

