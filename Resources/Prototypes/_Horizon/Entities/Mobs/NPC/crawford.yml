  categories: [ HideSpawnMenu ]
  components:
    - type: Loadout
      prototypes:
        - CrawfordGearA
    - type: NpcFactionMember
      factions:
        - Crawford
    - type: Dialogue
      dialogueTree: CrawfordDialogue
      canFollowAfterDialogue: true
    - type: DialogueState  # Добавляем компонент состояния
