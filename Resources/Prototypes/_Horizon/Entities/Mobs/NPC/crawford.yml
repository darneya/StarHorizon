- type: entity
  name: Crawford Mob
  abstract: true
  categories: [ HideSpawnMenu ]
  parent:
  - NFMobNoEquipmentOnGib
  - MobStaminaFodder
  - MobHumanoidHostileBase # для отображения внешности, моб НЕ БУДЕТ АТАКОВАТЬ НИ ПРИ КАКИХ СИТУАЦИЯХ
  - MobHumanoidInvetory
  id: MobCrawfordBase
  components:
  - type: Body
    prototype: HumanSyntheticOrgans
    requiredLegs: 2
  - type: NpcFactionMember
    factions:
    - Crawford
  - type: RandomHumanoidAppearance
    randomizeName: false
