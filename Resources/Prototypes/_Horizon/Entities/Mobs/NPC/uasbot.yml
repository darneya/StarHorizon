- type: entity
  id: UASCrab
  suffix: StarHorizon, UAS
  name: защитный бот UAS
  description: Бот необходимый для защиты важного оборудования UAS
  parent: [ MobElementalBase, MobCombat, BaseItem ]
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Horizon/Mobs/Elemental/uasbot.rsi
    state: UASBot
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: NpcFactionMember
    factions:
      - UASSecurBot
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/sparks4.ogg
    damage:
      types:
        Blunt: 2
        Heat: 3
  - type: StaminaDamageOnHit
    damage: 25
  - type: MovementSpeedModifier
    baseWalkSpeed : 2
    baseSprintSpeed : 4
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          Sheetkazmie:
            min: 1
            max: 1
          SheetEFS:
            min: 0
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  # - type: NpcFactionMember
  #   factions:
  #     - UASMaster

- type: entity
  id: UASDrone
  parent: UASCrab
  suffix: Aavikko, UAS
  categories: [ HideSpawnMenu ]
  components:
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/sparks4.ogg
    damage:
      types:
        Blunt: 5
        Heat: 5
  - type: StaminaDamageOnHit
    damage: 40
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60
  - type: SpawnItemsOnUse
    items:
      - id: UASDroneOff
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/Machines/button.ogg


- type: entity
  id: UASDroneOff
  name: отключенный защитный бот UAS
  suffix: StarHorizon, UAS
  parent: BaseItem
  components:
  - type: DeleteOnTrigger
  - type: OnUseTimerTrigger
    delay: 3.5
  - type: SpawnOnTrigger
    proto: UASDrone
  - type: Sprite
    sprite: _Horizon/Mobs/Elemental/uasbot.rsi
    state: off
  - type: Item
    sprite: _Horizon/Mobs/Elemental/uasbot.rsi
    state: off
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/Machines/button.ogg


