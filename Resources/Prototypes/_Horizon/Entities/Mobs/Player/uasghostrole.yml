- type: randomHumanoidSettings
  id: EventHumanoidUASAgent
  parent: EventHumanoid
  components:
    - type: AntagImmune

# советник
- type: randomHumanoidSettings
  id: GhostUASCounselor
  parent: EventHumanoidUASAgent
  randomizeName: false
  speciesBlacklist:
  - Geth
  - Diona
  - Gingerbread
  - SkeletonPerson
  - Vox
  - Orc
  components:
    - type: GhostRole
      name: советник UAS
      description: uas-Counselor-agent-description
      rules: uas-Counselor-agent-rule
      raffle:
        settings: short
    - type: Loadout
      prototypes: [ UASCounselorGear ]
    - type: RandomMetadata
      nameSegments:
        - "Советник"
        - NamesLastMilitaryUAS
    - type: AutoImplant
      implants:
      - UASTrakerImplant
