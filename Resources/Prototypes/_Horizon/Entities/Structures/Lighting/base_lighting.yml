- type: entity
  id: NFPoweredlightShielded
  description: "Осветительный прибор. Потребляет энергию и производит свет при установленной лампе. Усилен пласталью для защиты от солнечных вспышек."
  suffix: ""
  parent: NFPoweredlightShieldedEmpty
  components:
  - type: Sprite
    state: base
  - type: PointLight
    enabled: true
  - type: PoweredLight
    hasLampOnSpawn: LightTube
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -15
    range: 2
    sound:
      path: /Audio/Ambience/Objects/light_hum.ogg
  - type: DamageOnInteract
    damage:
      types:
        Heat: 2
    popupText: powered-light-component-burn-hand

