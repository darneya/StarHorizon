
- type: entity
  id: UASFabricator
  parent: BaseLatheLube
  name: фабрикатор UAS
  description: Как вы его собрали?
  suffix: StarHorizon, UAS, Structure
  components:
  - type: Sprite
    sprite: _Horizon/Structures/Machines/uasprotoplat.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
  - type: Machine
    board: UASAnomalyCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
        - UASMaterial
  - type: Lathe
    idleState: icon
    runningState: building
    staticRecipes:
    - uascap
    - uasberet
    - SuitUAS
    - SuitProtectiveUAS
    - SkirtUAS
    - SkirtProtectiveUAS
    - UASGloves
    - UASGlovesIsolate
    - UASBoots
    - ClothingNeckCloakUAS
    - ReliableContainerUASnanits
    - UASOmegaTool
    - UASVests
    - RipsiPlushin

- type: entity
  id: UASAnomalyCircuitboard
  parent: [BaseItem, BaseUASContraband]
  name: микросхема UAS
  suffix: StarHorizon, UAS
  description: Красная прозрачная микросхема. Вы ощущаете исходящее от неё тепло.
  components:
    - type: Sprite
      sprite: _Horizon/Objects/Misc/uasciruitboard.rsi
      state: boardproto
    - type: Item
      storedRotation: -90
    - type: StaticPrice
      price: 100
    - type: MachineBoard
      prototype: UASFabricator
      stackRequirements:
        MatterBin: 3
        Manipulator: 3
        EFS: 5
        Kazmie: 20
