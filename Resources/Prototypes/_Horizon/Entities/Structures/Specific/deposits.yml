# Deposit

- type: entity
  id: BaseOreDeposit
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Physics
    bodyType: Static
    canCollide: False
  - type: Fixtures
  - type: OreDeposit
  - type: Sprite
    drawdepth: FloorTiles
    sprite: _Horizon/Structures/Specific/deposit.rsi
    layers:
    - state: deposit1
      map: [ "random_deposit" ]
  - type: RandomSprite
    available:
    - random_deposit:
        deposit1: ""
        deposit2: ""
        deposit3: ""
        deposit4: ""
        deposit5: ""
        deposit6: ""
        deposit7: ""
        deposit8: ""
        deposit9: ""
        deposit10: ""

