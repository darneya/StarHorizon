# Scanner

- type: entity
  id: Level1OreScanner
  parent: BaseItem
  components:
  - type: OreScanner
    scanLevel: 1
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Horizon/Objects/Specific/Mining/locator.rsi
    layers:
    - state: icon
    - state: green-unlit
      shader: unshaded

- type: entity
  id: Level2OreScanner
  parent: Level1OreScanner
  components:
