# Deposit

- type: entity
  id: BaseOreDeposit
  name: Base Ore Deposit
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Physics
    bodyType: Static
    canCollide: False
  - type: Fixtures
  - type: OreDeposit
  - type: Sprite
    drawdepth: FloorTiles
    sprite: _Horizon/Structures/Specific/deposit.rsi
    layers:
    - state: deposit1
      map: [ "random_deposit" ]
  - type: RandomSprite
    available:
    - random_deposit:
        deposit1: ""
        deposit2: ""
        deposit3: ""
        deposit4: ""
        deposit5: ""
        deposit6: ""
        deposit7: ""
        deposit8: ""
        deposit9: ""
        deposit10: ""

- type: entity
  id: OreDepositSteelMetal
  parent: BaseOreDeposit
  name: жила с рудными металлами (сталь)
  description: Рудная жила с металлами для машиностроения.
  components:
  - type: OreDeposit
    oreCounts:
      Coal: 600
      SteelOre: 400
    hardness: 5
  - type: Sprite
    color: "#9da398"

