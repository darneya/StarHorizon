# Scanner

- type: entity
  id: Level1OreScanner
  parent: BaseItem
  name: Basic Ore Scanner
  description: A basic ore scanner.
  components:
  - type: OreScanner
    scanLevel: 1
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Horizon/Objects/Specific/Mining/locator.rsi
    layers:
    - state: icon
    - state: green-unlit
      shader: unshaded

- type: entity
  id: Level2OreScanner
  parent: Level1OreScanner
  name: Standard Ore Scanner
  description: A standard ore scanner.
  components:
  - type: OreScanner
    scanLevel: 2

- type: entity
  id: Level3OreScanner
  parent: Level1OreScanner
  name: Advanced Ore Scanner
  description: An advanced ore scanner.
  components:
  - type: OreScanner
    scanLevel: 3

- type: entity
  id: Level4OreScanner
  parent: Level1OreScanner
  name: Expert Ore Scanner
  description: An expert ore scanner.
  components:
  - type: OreScanner
    scanLevel: 4

- type: entity
  id: Level5OreScanner
  parent: Level1OreScanner
  name: локатор рудных месторождений
  description: Сканирует месторождения и отображает информацию по состоянию руды внутри него.
  components:
  - type: OreScanner
    scanLevel: 5
