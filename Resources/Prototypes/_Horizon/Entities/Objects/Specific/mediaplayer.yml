- type: entity
  id: MediaPlayer
  name: media player
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  description: A machine capable of playing a wide variety of tunes. Enjoyment not guaranteed.
  components:
  - type: Item
    size: Small
    sprite: Structures/Machines/jukebox.rsi # Нужны новые текстуры
  - type: Sprite
    sprite: Structures/Machines/jukebox.rsi # Нужны новые текстуры
    layers:
    - state: "off"
      map: ["enum.JukeboxVisualLayers.Base"]
  - type: Transform
  - type: MediaPlayer
  - type: ActivatableUI
    key: enum.MediaPlayerUIKey.Key
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
        enum.MediaPlayerUIKey.Key:
          type: MediaPlayerBoundUserInterface
        enum.WiresUiKey.Key:
          type: WiresBoundUserInterface
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.15
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200
