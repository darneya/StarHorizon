# Платы торговых фабрикаторов

# Базовый торговый фабрикатор
- type: entity
  id: TradeFabricatorCircuitboard
  parent: BaseMachineCircuitboard
  name: плата торгового фабрикатора
  description: Печатная плата для торгового фабрикатора.
  components:
  - type: Sprite
    state: supply
  - type: MachineBoard
    prototype: TradeFabricator
    requirements:
      MatterBin: 2
      Manipulator: 2
    materialRequirements:
      Steel: 5

# Военный торговый фабрикатор
- type: entity
  id: TradeFabricatorMilitaryCircuitboard
  parent: BaseMachineCircuitboard
  name: плата военного торгового фабрикатора
  description: Печатная плата для военного торгового фабрикатора.
  components:
  - type: Sprite
    state: security
  - type: MachineBoard
    prototype: TradeFabricatorMilitary
    requirements:
      MatterBin: 2
      Manipulator: 2
    materialRequirements:
      Steel: 5
      Plasteel: 2

# Промышленный торговый фабрикатор
- type: entity
  id: TradeFabricatorIndustrialCircuitboard
  parent: BaseMachineCircuitboard
  name: плата промышленного торгового фабрикатора
  description: Печатная плата для промышленного торгового фабрикатора.
  components:
  - type: Sprite
    state: engineering
  - type: MachineBoard
    prototype: TradeFabricatorIndustrial
    requirements:
      MatterBin: 3
      Manipulator: 2
    materialRequirements:
      Steel: 5

# Продовольственный торговый фабрикатор
- type: entity
  id: TradeFabricatorFoodCircuitboard
  parent: BaseMachineCircuitboard
  name: плата продовольственного фабрикатора
  description: Печатная плата для продовольственного фабрикатора.
  components:
  - type: Sprite
    state: service
  - type: MachineBoard
    prototype: TradeFabricatorFood
    requirements:
      MatterBin: 2
      Manipulator: 1
    materialRequirements:
      Steel: 5
