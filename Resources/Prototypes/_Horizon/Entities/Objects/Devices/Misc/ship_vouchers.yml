# ДЕБАГ

- type: entity
  parent: BaseShipVoucher
  id: ShipVoucherALL
  name: Ваунчер на любой шаттл
  description: Позволяет бесплатно купить один любой шаттл. Уничтожается при продаже шаттла.
  suffix: DEBUG, StarHorizon, не рабочий
  components:
  - type: Tag
    tags:
      - Debug
  - type: Sprite
    layers:
    - state: nfsd
  - type: Item
    heldPrefix: nfsd
  - type: ShipyardVoucher
    destroyOnEmpty: true
    consoleType: Shipyard
    access:
    - CentralCommand
    - NuclearOperative
    - SyndicateAgent
    - Wizard
    - Xenoborg
    - Pirate # Frontier
    accessGroups:
    - AllAccess
    - Silicon
    - GeneralNfsdAccess # Frontier

