- type: entity
  parent: [IDCardStandard, BaseUASContraband]
  id: UASStandartID
  name: UASID
  abstract: true
  components:
  - type: Sprite
    sprite: _Horizon/Objects/Misc/uasidcard.rsi
  - type: Clothing
    slots:
    - idcard
    sprite: _Horizon/Objects/Misc/uasidcard.rsi
  - type: Item
    size: Small

# Советник
- type: entity
  parent: UASStandartID
  id: UASCounselorID
  suffix: StarHorizon, UAS
  name: карта Совета UAS
  description: Карта с необходимыми для членов UAS доступами.
  components:
  - type: Sprite
    layers:
    - state: default
    - state: counselor
  - type: Item
  - type: IdCard
    jobTitle: Советник UAS
    jobIcon: JobIconCounselorUAS
  - type: Access
    tags:
    - Maintenance

