- type: entity
  id: SyringeGunProject
  name: Syrgine
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 0  # Should have the same or less damage than a regular pellet
  - type: SolutionContainerManager
    solutions:
      ammo:
        maxVol: 5
  - type: RefillableSolution
    solution: ammo
  - type: DrainableSolution
    solution: ammo
  - type: SolutionInjectOnProjectileHit
    transferAmount: 5
    solution: ammo
  - type: InjectableSolution
    solution: ammo
  - type: Sprite
    sprite: Aavikko/Objects/Weapons/Guns/Projectiles/syringeproj.rsi
    layers:
    - state: syringeproj

