- type: entity
  id: BulletWeakRocketFire
  name: weak rocket
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: frag
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: DefaultFire
    maxIntensity: 15 # max 30 per tile
    intensitySlope: 1
    totalIntensity: 30 # 60 total damage to distribute over tiles
    maxTileBreak: 1
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: IgniteOnCollide
    fireStacks: 5

- type: entity
  categories: [ HideSpawnMenu ]
  id: BulletRocketLRM
  name: weak rocket
  parent: BulletWeakRocket
  components:
  - type: Explosive
    explosionType: Default
    totalIntensity: 40 # about a ~6 tile radius
    intensitySlope: 1
    maxIntensity: 5

- type: entity
  id: BulletCutter
  name: cutter bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: Not too bad, but you still don't want to get hit by it.
  components:
  - type: Reflective
    reflective:
    - NonEnergy
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: adtomnilaser
      shader: unshaded
  - type: GatheringProjectile
    amount: 30
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Heat: 30
        Structural: 20
  - type: TimedDespawn
    lifetime: 0.2
