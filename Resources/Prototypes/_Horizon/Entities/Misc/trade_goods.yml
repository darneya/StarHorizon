# === Базовый прототип ===
# Торговые товары - объекты пола, которые нельзя брать в руки, только таскать
- type: entity
  abstract: true
  parent: BaseStructureDynamic
  id: BaseHorizonTradeItem
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.35,0.35,0.35"
        density: 80
        mask:
        - CrateMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: RequireProjectileTarget

# === Военные товары ===
# Военные товары дороже на ANCO, дешевле на DFI

- type: entity
  parent: BaseHorizonTradeItem
  id: TradeGoodAmmo
  name: Запечатанный ящик боеприпасов
  description: Герметично запечатанный ящик с довоенными боеприпасами. Наклейка на боку указывает на консоль экспорта.
  components:
  - type: Sprite
    sprite: _NF/Objects/Tools/bundles.rsi
    state: engi-base
  - type: HorizonFactionPrice
