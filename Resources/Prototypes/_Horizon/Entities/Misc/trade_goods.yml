# Base

- type: entity
  abstract: true
  parent: BaseStructureDynamic
  id: BaseHorizonTradeItem
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.35,0.35,0.35"
        density: 80
        mask:
        - CrateMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: RequireProjectileTarget

