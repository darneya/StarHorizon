# Тут находятся прототипы AI поведения сущностей.
# Они описывают сложные составные задачи (CompoundTask) для ИИ, а составные задачи в свою очередь
# уже состоят из древа действий, которые в конечном итоге приводят к самым простым
# действиям, которые называются примитивными действиями (PrimitiveTask).
#
# Эти прототипы можно назвать основным поведением сущности в зависимости от того,
# какой эффект от ИИ вы хотите достичь.
#
# Пример использования в компонентах:
# - type: HTN
#    rootTask:
#      task: CompanionCompound

# Искуственный интелект компаньонов.
# - type: htnCompound
#   id: CompanionCompound
#   branches:
#     - tasks:
#       - !type:HTNCompoundTask
#         task: CompanionFollowCompound
