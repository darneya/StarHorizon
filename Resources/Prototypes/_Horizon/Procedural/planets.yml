- type: planet
  id: Lavaland
  biome: LavaLand
  mapName: shuttle-destination-lavaland
  mapLight: "#1a0005"
  spawnRoundstart: false
  addedComponents:
  - type: SpawnInRange
    spawns:
      NFBasaltRoomMarker:
        min: 7
        max: 9
    minRange: 40
    maxRange: 300
    minDistanceBetweenSpawns: 25
  - type: FTLDestination
  - type: WeatherCycle
    stages:
    - duration: # 5-10 minutes of calm
        min: 400
        max: 600
