# Syndicate Outpost POI
- type: pointOfInterest
  id: SindiOutpost
  parent: BasePOI
  name: "Syndicate Outpost"
  minimumDistance: 7500
  maximumDistance: 15000
  spawnGroup: Required
  gridPath: /Maps/_Horizon/POI/SindiOupost.yml
  addComponents:
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true

- type: gameMap
  id: SindiOutpost
  mapName: "Syndicate Outpost"
  mapPath: /Maps/_Horizon/POI/SindiOupost.yml
  minPlayers: 0
  stations:
    SindiOutpost:
      stationProto: StandardFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: "Syndicate Outpost"
        - type: BindToStationVariationPassExemption
