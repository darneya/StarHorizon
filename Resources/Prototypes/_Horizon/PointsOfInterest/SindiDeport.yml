- type: pointOfInterest
  id: SindiDeport
  parent: BasePOI
  name: "Syndicate Deport"
  minimumDistance: 7500
  maximumDistance: 15000
  spawnGroup: Required
  gridPath: /Maps/_Horizon/POI/SindiDeport.yml
  addComponents:
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true

- type: gameMap
  id: SindiDeport
  mapName: "Syndicate Deport"
  mapPath: /Maps/_Horizon/POI/SindiDeport.yml
  minPlayers: 0
  stations:
    SindiDeport:
      stationProto: StandardFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: "Syndicate Deport"
        - type: BindToStationVariationPassExemption
