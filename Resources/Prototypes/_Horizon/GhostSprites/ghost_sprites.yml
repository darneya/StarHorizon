# Ghost sprite prototypes for player customization
# Players can select these sprites when in ghost mode

# ============================================
# EVERY - Available to all players
# ============================================

- type: ghostSprite
  id: GhostSpriteDefault
  name: Стандартный
  rsiPath: Mobs/Ghosts/ghost_human.rsi
  state: animated

- type: ghostSprite
  id: GhostSpriteAngel
  name: Ангел
  rsiPath: _Horizon/Sponsors/Ghosts/every/angel.rsi
  state: animated

- type: ghostSprite
  id: GhostSpriteDemon
  name: Демон
  rsiPath: _Horizon/Sponsors/Ghosts/every/demon.rsi
  state: animated

# ============================================
# SPONSORS - Available only to sponsors
# ============================================

- type: ghostSprite
  id: GhostSpriteEvilNeko
  name: EvilNeko
  rsiPath: _Horizon/Sponsors/Ghosts/sponsors/evilneko.rsi
  state: animated
  sponsorOnly: true

# ============================================
# INDIVIDUAL - Available only to specific players by ckey
