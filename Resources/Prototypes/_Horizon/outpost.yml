- type: entity
  id: DefaultOutpostConsole
  parent: BaseComputer
  components:
  - type: Computer
    board: Null
  - type: ActivatableUI
    key: enum.CaptureUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CaptureUIKey.Key:
        type: OutpostConsoleBoundInterface
  - type: ItemSlots # TODO: move ItemSlot to be nullable, withdraw shouldn't have one at all
  - type: ContainerContainer
    containers:
      board: !type:Container
      id-card-slot: !type:ContainerSlot
  - type: OutpostConsole
    canUseAsSpawnPoint: true
    captureTime: 10

- type: outpostSpawn
  id: default
  spawn:
    - id: CardDeckNanotrasen
      amount: 4 