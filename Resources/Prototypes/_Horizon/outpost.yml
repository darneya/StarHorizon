- type: entity
  id: DefaultOutpostConsole
  parent: BaseComputer
  components:
  - type: Computer
    board: Null
  - type: ItemSlots # TODO: move ItemSlot to be nullable, withdraw shouldn't have one at all
  - type: ContainerContainer
    containers:
      board: !type:Container
      id-card-slot: !type:ContainerSlot
  - type: OutpostConsole
    canUseAsSpawnPoint: true
    captureTime: 10

- type: outpostSpawn
  id: default
  spawnList:
  - id: CassetteTape
    amount: 4 