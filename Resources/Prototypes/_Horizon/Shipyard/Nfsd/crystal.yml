- type: vessel
  id: Crystal
  parent: BaseVessel
  name: NFS Crystal
  description: Научный шаттл оснащенный нужными прибораи
  price: 95000 # ???, 63058 50% = 94000
  category: Medium
  group: Security
  access: Security
  shuttlePath: /Maps/_Horizon/Shuttles/Shipyard/Nfsd/crystal.yml
