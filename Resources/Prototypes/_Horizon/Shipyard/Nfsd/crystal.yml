- type: gameMap
  id: Crystal
  mapName: 'NFS Crystal'
  mapPath:  /Maps/_Horizon/Shuttles/Shipyard/Nfsd/crystal.yml
  minPlayers: 0
  stations:
    Crystal:
      stationProto: StandardFrontierSecurityVessel
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Crystal {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
