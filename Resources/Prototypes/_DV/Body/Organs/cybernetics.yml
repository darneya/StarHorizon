  id: OrganBioStomach
  parent: OrganHumanStomach
  name: продвинутый желудок
  description: "Улучшенный биологический желудок с увеличенным числом одновременно усваивающихся реагентов. Чертежи предоставлены Interdyne Pharmaceutics, произведён и импортирован корпорацией BioXen."
