- type: entity
  id: OrganBsStomach
  parent: OrganHumanStomach
  name: блюспейс желудок
  description: "Продвинутый блюспейс-желудок, обладающий увеличенной вместимостью. Имеет маркировку BX-100/4/1. Произведён и импортирован корпорацией BioXen."
  suffix: Aavikko, BioXen
  components:
  - type: Sprite
    sprite: Aavikko/Mobs/Species/Cyberlimbs/organs_bs.rsi
    state: stomach
  - type: Item
    size: Small
    heldPrefix: stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 100
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: OrganDamage
    damage:
      types:
        Poison: 80
        Cellular: 10
        Bloodloss: 20
        Caustic: 10
        Radiation: 10
  - type: Metabolizer
    maxReagents: 4

- type: entity
  id: OrganCyberStomach
  parent: OrganHumanStomach
  name: кибернетический желудок
  description: "Кибернетическй желудок с увеличенной продуктивностью. Имеет маркировку BX-60/4/0,5. Чертежи предоставлены Interdyne Pharmaceutics, произведён и импортирован корпорацией BioXen."
  suffix: Aavikko, BioXen
  components:
  - type: Sprite
    sprite: Aavikko/Mobs/Species/Cyberlimbs/organs_cyber.rsi
    state: stomach
  - type: Item
    size: Small
    heldPrefix: stomach
  - type: Stomach
    updateInterval: 0.5
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 60
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: OrganDamage
    damage:
      types:
        Poison: 80
        Cellular: 15
        Bloodloss: 20
        Caustic: 15
        Radiation: 10
  - type: Metabolizer
    maxReagents: 4
    updateInterval: 0.5

