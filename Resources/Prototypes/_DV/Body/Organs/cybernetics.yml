- type: entity
  id: OrganBsLungs
  parent: OrganHumanLungs
  name: блюспейс лёгкие
  description: "Продвинутые блюспейс-лёгкие, обладающией увеличенной вместимостью. Имеют маркировку BX-500/100/1. Произведены и импортированы корпорацией BioXen."
  suffix: Aavikko, BioXen
  components:
  - type: Sprite
    sprite: Aavikko/Mobs/Species/Cyberlimbs/organs_bs.rsi
    layers:
      - state: lung-l
      - state: lung-r
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Human ]
    groups:
    - id: Gas
      rateModifier: 100.0
  - type: OrganDamage
    damage:
      types:
        Asphyxiation: 120
        Cellular: 10
        Bloodloss: 20
        Radiation: 20
  - type: SolutionContainerManager
    solutions:
      Lung:
        maxVol: 500.0
        canReact: false

