    - type: Paper
      content: >-
        [bold]Компания Oblivion Rise Shipyards рада приветсвовать экипаж и пассажиров на борту нашего нового гражданского шатла ORS type 1U "Boiga". [/bold]


        Мы желаем вам приятного пути. На шатле есть спальные комнаты и баня для посетителей и экипажа. Далее будут указана инструкция по настройке воздуховода в бане.


        Изначально он выключен чтобы не создавать напряжение на систему, но для создания атмосферы и для отдыха мы вам рекомендуем сделать следующее:


        - Подойти к воздушной сигнализации в банной комнате.


        - Открыть панель управления воздушной сигнализацией.


        - Открыть вкладку "скрубберы" и выбрать единственный скруббер.


        - Открыть вкладку Gas filters (Фильтр газа)


        - Нажать на кнопку Water Vapor (Водяной пар)


        Поздравляем! Вы успешно выключили фильтрацию водяного пара скрубером находящимся в банной комнате. Это позволит вам как минимум создать видимость бани не меняя температуру. Настройки сенсора рекомендуем не трогать так как он и так настроен на заводские стандарты где верхняя тревожная температура 41 градус по цельсию.


        Желаем вам приятного пути и помните:


        [bold]"Из бездны к звездам!"


        Oblivion Rise Shipyards[/bold]
